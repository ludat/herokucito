{{- $hasRegistryImages := false }}
{{- $upstreamStages := dict }}
{{- $servicesWithImages := list }}
{{- range $serviceName, $service := .Values.services }}
{{-   if and $service.image $service.image.source }}
{{-     $source := $service.image.source }}
{{-     if has $source.type (list "semver" "lexical" "digest") }}
{{-       $hasRegistryImages = true }}
{{-       $servicesWithImages = append $servicesWithImages (dict "name" $serviceName "image" $service.image "key" (printf "services.%s.image.tag" $serviceName)) }}
{{-     else if eq $source.type "upstream" }}
{{-       $_ := set $upstreamStages $source.stage true }}
{{-       $servicesWithImages = append $servicesWithImages (dict "name" $serviceName "image" $service.image "key" (printf "services.%s.image.tag" $serviceName)) }}
{{-     else }}
{{-       fail (printf "service %s: invalid source.type %q, must be one of: semver, lexical, digest, upstream" $serviceName $source.type) }}
{{-     end }}
{{-   end }}
{{- end }}
{{- range $phase := list "pre-deploy" "post-deploy" }}
{{- range $idx, $hook := (index $.Values.hooks $phase) }}
{{-   if and $hook.image $hook.image.source }}
{{-     $source := $hook.image.source }}
{{-     if has $source.type (list "semver" "lexical" "digest") }}
{{-       $hasRegistryImages = true }}
{{-       $servicesWithImages = append $servicesWithImages (dict "name" (printf "hook-%s-%s" $phase $hook.name) "image" $hook.image "key" (printf "hooks.%s[%d].image.tag" $phase (int $idx))) }}
{{-     else if eq $source.type "upstream" }}
{{-       $_ := set $upstreamStages $source.stage true }}
{{-       $servicesWithImages = append $servicesWithImages (dict "name" (printf "hook-%s-%s" $phase $hook.name) "image" $hook.image "key" (printf "hooks.%s[%d].image.tag" $phase (int $idx))) }}
{{-     else }}
{{-       fail (printf "hook %s/%s: invalid source.type %q, must be one of: semver, lexical, digest, upstream" $phase $hook.name $source.type) }}
{{-     end }}
{{-   end }}
{{- end }}
{{- end }}
apiVersion: kargo.akuity.io/v1alpha1
kind: Stage
metadata:
  name: {{ include "herokucito-stage.fullname" . }}
  finalizers:
    - kargo.akuity.io/finalizer
spec:
  requestedFreight:
    {{- if $hasRegistryImages }}
    - origin:
        kind: Warehouse
        name: {{ include "herokucito-stage.promotionWarehouse" $ | quote }}
      sources:
        direct: true
    {{- end }}
    {{- range $upstream, $_ := $upstreamStages }}
    - origin:
        kind: Warehouse
        name: {{ include "herokucito-stage.promotionWarehouse" $ | quote }}
      sources:
        stages:
          - {{ $upstream }}
    {{- end }}
  promotionTemplate:
    spec:
      steps:
        {{- if eq (include "herokucito-stage.promotionMethod" .) "git" }}
        - uses: git-clone
          config:
            repoURL: {{ .Values.stage.valuesRepo.url | quote }}
            checkout:
              - path: ./out
                branch: {{ .Values.stage.valuesRepo.branch | quote }}
        {{- range $entry := $servicesWithImages }}
        - uses: yaml-update
          as: update-{{ $entry.name }}
          config:
            path: ./out/{{ $.Values.stage.valuesRepo.path }}
            updates:
              - key: {{ $entry.key }}
                value: {{ `${{` }} imageFrom({{ $entry.image.repository | quote }}).Tag + "@" + imageFrom({{ $entry.image.repository | quote }}).Digest {{ `}}` }}
        {{- end }}
        - uses: git-commit
          as: commit
          config:
            path: ./out
            message: |
              [{{ `${{` }} ctx.stage {{ `}}` }}] Update images
        - uses: git-push
          config:
            path: ./out
        - uses: argocd-update
          config:
            apps:
              - name: {{ `${{` }} ctx.project {{ `}}` }}-{{ `${{` }} ctx.stage {{ `}}` }}
                namespace: {{ `${{` }} ctx.project {{ `}}` }}
        {{- else if eq (include "herokucito-stage.promotionMethod" .) "direct" }}
        - uses: argocd-update
          config:
            apps:
              - name: {{ `${{` }} ctx.project {{ `}}` }}-{{ `${{` }} ctx.stage {{ `}}` }}
                namespace:  {{ `${{` }} ctx.project {{ `}}` }}
                sources:
                  - repoURL: {{ .Values.stage.appChart.repoURL | quote }}
                    {{- if .Values.stage.appChart.chart }}
                    chart: {{ .Values.stage.appChart.chart | quote }}
                    {{- end }}
                    helm:
                      images:
                        {{- range $entry := $servicesWithImages }}
                        - key: {{ $entry.key }}
                          value: {{ `${{` }} imageFrom({{ $entry.image.repository | quote }}).Tag + "@" + imageFrom({{ $entry.image.repository | quote }}).Digest {{ `}}` }}
                        {{- end }}
        {{- else }}
        {{- fail (printf "invalid stage.promotion.method %q, must be one of: git, direct" (include "herokucito-stage.promotionMethod" .)) }}
        {{- end }}

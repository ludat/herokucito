{{- $root := . -}}
{{- $appName := include "herokucito-app.fullname" . -}}
{{- $platform := include "herokucito-app.platform" . | fromYaml -}}
{{- $production := .Values.production | default false -}}
{{- range $depName, $dep := .Values.dependencies }}
{{- if eq $dep.type "postgres" }}
{{- $clusterName := printf "%s-%s" $appName $depName }}
{{- $storeName := printf "%s-store" $clusterName }}
{{- $pgPlatform := $platform.postgres }}
{{- /* Production defaults: ha=true, failsafe=true, backups=true */ -}}
{{- $ha := $production }}
{{- $failsafe := $production }}
{{- $backups := $production }}
---
apiVersion: postgresql.cnpg.io/v1
kind: Cluster
metadata:
  name: {{ $clusterName }}
  labels:
    {{- include "herokucito-app.labels" $root | nindent 4 }}
  annotations:
    argocd.argoproj.io/sync-wave: "-20"
    {{- if $failsafe }}
    argocd.argoproj.io/sync-options: Delete=confirm
    {{- end }}
spec:
  {{- if $ha }}
  instances: 2
  enablePDB: true
  {{- else }}
  instances: 1
  enablePDB: false
  {{- end }}
  bootstrap:
    initdb:
      database: appdb
      owner: app
      postInitSQL:
        - ALTER USER app WITH SUPERUSER;
  storage:
    {{- $sizePreset := $dep.size | default "small" }}
    {{- $storageSize := index $pgPlatform.sizePresets $sizePreset }}
    size: {{ $storageSize | quote }}
    {{- if not $production }}
    storageClass: juicefs-cheap-shared
    {{- end }}
  resources:
    {{- $resources := index $pgPlatform.resourcePresets $sizePreset }}
    {{- toYaml $resources | nindent 4 }}
  {{- if $backups }}
  plugins:
    - enabled: true
      name: barman-cloud.cloudnative-pg.io
      isWALArchiver: true
      parameters:
        barmanObjectName: {{ $storeName | quote }}
  {{- end }}
{{- if $backups }}
---
apiVersion: barmancloud.cnpg.io/v1
kind: ObjectStore
metadata:
  name: {{ $storeName }}
  labels:
    {{- include "herokucito-app.labels" $root | nindent 4 }}
  annotations:
    argocd.argoproj.io/sync-wave: "-20"
spec:
  configuration:
    endpointURL: {{ required "platform.postgres.backup.endpointURL is required when production=true" $pgPlatform.backup.endpointURL }}
    destinationPath: {{ printf "%s/%s" (required "platform.postgres.backup.destinationPath is required when production=true" $pgPlatform.backup.destinationPath) $clusterName | quote }}
    s3Credentials:
      accessKeyId:
        name: {{ required "platform.postgres.backup.s3Credentials.secretName is required when production=true" $pgPlatform.backup.s3Credentials.secretName }}
        key: {{ $pgPlatform.backup.s3Credentials.accessKeyIdKey | default "ACCESS_KEY_ID" }}
      secretAccessKey:
        name: {{ required "platform.postgres.backup.s3Credentials.secretName is required when production=true" $pgPlatform.backup.s3Credentials.secretName }}
        key: {{ $pgPlatform.backup.s3Credentials.secretAccessKeyKey | default "ACCESS_SECRET_KEY" }}
    wal:
      compression: {{ $pgPlatform.backup.walCompression | default "gzip" }}
  instanceSidecarConfiguration:
    resources:
      {{- $pgPlatform.backup.sidecarResources | required "platform.postgres.backup.sidecarResources is required" | toYaml | nindent 6 }}
  retentionPolicy: {{ $pgPlatform.backup.retentionPolicy | default "30d" | quote }}
---
apiVersion: postgresql.cnpg.io/v1
kind: ScheduledBackup
metadata:
  name: {{ $clusterName }}-backup
  labels:
    {{- include "herokucito-app.labels" $root | nindent 4 }}
spec:
  schedule: {{ $pgPlatform.backup.schedule | default "0 0 0 * * *" | quote }}
  backupOwnerReference: self
  cluster:
    name: {{ $clusterName }}
  method: plugin
  pluginConfiguration:
    name: barman-cloud.cloudnative-pg.io
{{- end }}
{{- end }}
{{- end }}

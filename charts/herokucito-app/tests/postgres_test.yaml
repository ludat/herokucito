suite: postgres
templates:
  - templates/postgres.yaml
tests:
  - it: renders postgres in non-production mode
    set:
      dependencies:
        db:
          type: postgres
          size: small
    asserts:
      - matchSnapshot: {}

  - it: renders postgres in production mode
    set:
      production: true
      dependencies:
        db:
          type: postgres
          size: small
    asserts:
      - matchSnapshot: {}

  - it: fails when production=true but endpointURL is missing
    set:
      production: true
      dependencies:
        db:
          type: postgres
      platform.x.postgres.backup.endpointURL: ""
    asserts:
      - failedTemplate:
          errorMessage: "platform.postgres.backup.endpointURL is required when production=true"

  - it: fails when production=true but destinationPath is missing
    set:
      production: true
      dependencies:
        db:
          type: postgres
      platform.x.postgres.backup.destinationPath: ""
    asserts:
      - failedTemplate:
          errorMessage: "platform.postgres.backup.destinationPath is required when production=true"

  - it: fails when production=true but s3Credentials.secretName is missing
    set:
      production: true
      dependencies:
        db:
          type: postgres
      platform.x.postgres.backup.s3Credentials.secretName: ""
    asserts:
      - failedTemplate:
          errorMessage: "platform.postgres.backup.s3Credentials.secretName is required when production=true"

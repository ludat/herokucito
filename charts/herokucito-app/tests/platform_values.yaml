platformKey: test
platform:
  test:
    resourcePresets:
      small:
        limits:
          cpu: 100m
          memory: 256Mi
        requests:
          cpu: 20m
          memory: 64Mi
    postgres:
      sizePresets:
        small: 5Gi
      resourcePresets:
        small:
          limits:
            cpu: "1"
            memory: 516Mi
          requests:
            cpu: 60m
            memory: 128Mi
      backup:
        endpointURL: https://test.r2.cloudflarestorage.com
        destinationPath: s3://cloudnativepg-backups
        s3Credentials:
          secretName: shared-psql-wale-creds
        retentionPolicy: "30d"
        schedule: "0 0 0 * * *"
